# Settings for Firebase App Hosting (Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0

env:
  # Chave da API do Gemini (Google AI) para geração de sport pages com IA
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME
  # Web API Key do Firebase, usada server-side (src/lib/firebase-rest.ts)
  # para login com senha e e-mail de redefinição via Identity Toolkit
  - variable: FIREBASE_WEB_API_KEY
    secret: FIREBASE_WEB_API_KEY
    availability:
      - RUNTIME
